<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analysis</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin-top:50px;
        }

        textarea{
            width:60%;
            height:150px;
            padding:10px;
        }

        button{
            padding:10px 20px;
            margin-top:10px;
        }

        .result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
        }
    </style>
</head>

<body>

    <h1>IMDB Sentiment Analysis</h1>

    <form method="POST">

        <textarea
            name="review"
            placeholder="Enter your movie review here..."
            required></textarea>

        <br>

        <button type="submit">
            Predict Sentiment
        </button>

    </form>

    {% if sentiment %}

    <div class="result">
        Sentiment: {{ sentiment }}
        <br><br>
        Confidence: {{ confidence }}%
    </div>

    {% endif %}

</body>
</html>
